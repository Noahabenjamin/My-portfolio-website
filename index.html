<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noah Benjamin | Opening Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="opening-page">
      <div class="scene" id="scene" tabindex="0">
        <div class="world" id="world">
          <div class="sign-group" aria-label="Wooden sign with name">
            <div class="sign-pole" aria-hidden="true"></div>
            <div class="wood-sign">Noah Benjamin</div>
          </div>
          <div class="sewer-hole" id="hole" aria-hidden="true"></div>
          <div class="character" id="character" aria-label="Player character">
            <div class="character-model">
              <span class="head">
                <span class="face-3d"></span>
                <span class="face-3d-l"></span>
                <span class="face-3d-t"></span>
                <span class="face-line"></span>
                <span class="eye eye-left"></span>
                <span class="eye eye-right"></span>
              </span>
              <span class="torso">
                <span class="face-3d"></span>
                <span class="face-3d-l"></span>
              </span>
              <span class="arm arm-left">
                <span class="face-3d"></span>
                <span class="face-3d-l"></span>
                <span class="hand"></span>
              </span>
              <span class="arm arm-right">
                <span class="face-3d"></span>
                <span class="face-3d-l"></span>
                <span class="hand"></span>
              </span>
              <span class="leg leg-left">
                <span class="face-3d"></span>
                <span class="face-3d-l"></span>
                <span class="foot"></span>
              </span>
              <span class="leg leg-right">
                <span class="face-3d"></span>
                <span class="face-3d-l"></span>
                <span class="foot"></span>
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="arrow-hint" id="arrowHint" aria-hidden="true">
        <span class="arrow arrow-up"></span>
        <span class="arrow arrow-left"></span>
        <span class="arrow arrow-down"></span>
        <span class="arrow arrow-right"></span>
      </div>

      <!-- Portal world — shown when character falls into hole -->
      <div class="portal-world" id="portalWorld" aria-hidden="true">
        <div class="portal-bg"></div>
        <div class="portal-char">
          <div class="portal-model">
            <span class="head">
              <span class="face-3d"></span>
              <span class="face-3d-l"></span>
              <span class="face-3d-t"></span>
              <span class="face-line"></span>
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
            </span>
            <span class="torso">
              <span class="face-3d"></span>
              <span class="face-3d-l"></span>
            </span>
            <span class="arm arm-left">
              <span class="face-3d"></span>
              <span class="face-3d-l"></span>
              <span class="hand"></span>
            </span>
            <span class="arm arm-right">
              <span class="face-3d"></span>
              <span class="face-3d-l"></span>
              <span class="hand"></span>
            </span>
            <span class="leg leg-left">
              <span class="face-3d"></span>
              <span class="face-3d-l"></span>
              <span class="foot"></span>
            </span>
            <span class="leg leg-right">
              <span class="face-3d"></span>
              <span class="face-3d-l"></span>
              <span class="foot"></span>
            </span>
          </div>
        </div>
        <p class="portal-hint">Press any key to return</p>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
